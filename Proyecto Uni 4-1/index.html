<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Académico - Inscripciones</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Logo_cole-removebg-preview.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <nav class="navbar-estilo">
        <div class="nav-logo">
            PORTAL ACADÉMICO
        </div>
        <div class="nav-derecha">
            <a href="index.html" class="nav-link nav-activo">Inscripciones</a>
            <a href="login.html" class="nav-link">Panel Docentes</a>
            
            <button id="themeToggle" class="theme-btn" aria-label="Cambiar tema">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="contenedor-principal">

        <div id="vistaInscripcion" class="flat-card vista-entrada animate-fade-in">
            <h2 class="titulo-seccion" style="text-align: center;">Registro de Inscripción</h2>
            <form id="formRegistro">
                <div class="form-group">
                    <label class="label-style">Nombre Completo *</label>
                    <input type="text" id="inputNombre" class="input-minimal" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="label-style">Cédula / ID *</label>
                        <input type="text" id="inputCedula" class="input-minimal" placeholder="Ej. 123456" required>
                    </div>
                    <div class="form-group">
                        <label class="label-style">Edad</label>
                        <input type="number" id="inputEdad" class="input-minimal" placeholder="Ej. 5">
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-style">Asignar Grado / Sección *</label>
                    <select id="inputGrado" class="input-minimal" required>
                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="2do Grupo Maternal">2do Grupo Maternal</option>
                        <option value="3er Grupo Maternal">3er Grupo Maternal</option>
                        <option value="1er Grupo Preescolar">1er Grupo Preescolar</option>
                        <option value="2do Grupo Preescolar">2do Grupo Preescolar</option>
                        <option value="3er Grupo Preescolar">3er Grupo Preescolar</option>
                        <option value="1er Grado">1er Grado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="label-style">Representante</label>
                    <input type="text" id="inputRep" class="input-minimal" placeholder="Nombre del tutor">
                </div>

                <div class="form-group">
                    <label class="label-style">Teléfono</label>
                    <input type="tel" id="inputTelf" class="input-minimal" placeholder="Ej. 0414-1234567">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="label-style">Condición Médica</label>
                        <input type="text" id="inputEnfermedad" class="input-minimal" placeholder="Ninguna">
                    </div>
                    <div class="form-group">
                        <label class="label-style">Alergias</label>
                        <input type="text" id="inputAlergia" class="input-minimal" placeholder="Ninguna">
                    </div>
                </div>

                <button type="submit" class="btn-primario" style="width: 100%; margin-top: 1rem;">Inscribir y Descargar Planilla</button>
            </form>
        </div>

    </main>

    <script src="inscripcion.js"></script>
</body>
</html>
