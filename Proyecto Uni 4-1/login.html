<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Académico - Panel Docente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Logo_cole-removebg-preview.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <nav class="navbar-estilo">
        <div class="nav-logo">
            PORTAL ACADÉMICO
        </div>
        <div class="nav-derecha">
            <a href="index.html" class="nav-link">Inscripciones</a>
            <a href="login.html" class="nav-link nav-activo">Panel Docentes</a>
            
            <button id="themeToggle" class="theme-btn" aria-label="Cambiar tema">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="contenedor-principal">

        <div id="vistaLoginDocentes" class="flat-card vista-entrada animate-fade-in">
            <h2 class="titulo-seccion" style="text-align: center;">Acceso Docente</h2>
            <form id="formLogin">
                <div class="form-group">
                    <label class="label-style">Usuario</label>
                    <input type="text" id="loginUser" class="input-minimal" placeholder="docente2026" required>
                </div>
                <div class="form-group">
                    <label class="label-style">Contraseña</label>
                    <input type="password" id="loginPass" class="input-minimal" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primario" style="width: 100%; margin-top: 1rem;">Ingresar al Panel</button>
            </form>
        </div>

        <div id="vistaPanelDocentes" class="flat-card animate-fade-in hidden" style="max-width: 800px; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 class="titulo-seccion" style="margin-bottom: 0;">Panel de Control de Matrícula</h2>
                    <p style="font-size: 0.8rem; color: var(--text-muted);" id="fechaActual"></p>
                </div>
                <button id="btnCerrarSesion" class="btn-primario" style="background-color: #e11d48;">Cerrar Sesión</button>
            </div>

            <div class="grid-stats">
                <div class="stat-box">
                    <span class="label-style">2do Maternal</span>
                    <div id="count-2doMaternal" class="stat-number">0</div>
                </div>
                <div class="stat-box">
                    <span class="label-style">3er Maternal</span>
                    <div id="count-3erMaternal" class="stat-number">0</div>
                </div>
                <div class="stat-box">
                    <span class="label-style">1er Preescolar</span>
                    <div id="count-1erPreescolar" class="stat-number">0</div>
                </div>
                <div class="stat-box">
                    <span class="label-style">2do Preescolar</span>
                    <div id="count-2doPreescolar" class="stat-number">0</div>
                </div>
                <div class="stat-box">
                    <span class="label-style">3er Preescolar</span>
                    <div id="count-3erPreescolar" class="stat-number">0</div>
                </div>
                <div class="stat-box">
                    <span class="label-style">1er Grado</span>
                    <div id="count-1erGrado" class="stat-number">0</div>
                </div>
            </div>
        </div>

    </main>

    <script src="login.js"></script>
</body>
</html>
